<style>
  body {
    background: #0f172a;
    color: #e5e7eb;
    font-family: Segoe UI, Arial, sans-serif;
  }

  .fq-app {
    padding: 32px;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a, #111827);
  }

  .fq-title {
    font-size: 42px;
    font-weight: 800;
    color: #38bdf8;
  }

  .fq-subtitle {
    font-size: 20px;
    color: #c084fc;
    margin-bottom: 24px;
  }

  .fq-nav button {
    margin-right: 10px;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }

  .fq-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 18px;
    padding: 22px;
    margin: 16px 0;
    box-shadow: 0 10px 25px rgba(0,0,0,.3);
  }

  .fq-xp {
    height: 14px;
    background: #334155;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 8px;
  }

  .fq-xp-fill {
    width: 35%;
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #38bdf8);
  }

  .fq-button {
    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 700;
  }

</style><div class="columns">
  <aside class="column sidebar is-narrow">
    <section class="section">
      <nav class="menu">
        <ul class="menu-list">
          ${Menu}
          <template id="MenuItem">
            <li><a class="${Active}" href="${Url}">${Text}</a></li>
          </template>
        </ul>
      </nav>
    </section>
  </aside>
  <div class="column">
    <section class="section">
      ${Body}

      <div id="notification-area">
        <div>${Error}</div>
      </div>

      <template id="Home">
       <template id="Home">
  <div class="content">
    <h1 class="title">FocusQuest</h1>
    <h2 class="subtitle">Level Up Your Focus</h2>

    <p>
      Turn your daily study and productivity goals into quests.
      Complete focus sessions, earn XP, and level up your character.
    </p>

    <div class="box">
      <h3 class="title is-4">Today’s Mission</h3>
      <p>Complete your first focus quest and start your journey.</p>
    </div>
  </div>
</template>

      <template id="Counter">
        <h1 class="title">A simple counter</h1>
        <p>
          <button onclick="${Decrement}" class="button">-</button>
          <input type="number" id="counter" class="input" bind="${Value}">
          <button onclick="${Increment}" class="button">+</button>
        </p>
        <p>
          The counter's value is: ${Value}
        </p>
      </template>

      <template id="Data">
        <h1 class="title">
          Download data
          <button class="button" onclick="${Reload}">Reload</button>
        </h1>
        <p>
          Signed in as ${Username}.
          <button class="button" onclick="${SignOut}">Sign out</button>
        </p>
        <table class="table is-fullwidth">
          <thead>
            <tr>
              <th>Title</th>
              <th>Author</th>
              <th>Published</th>
              <th>ISBN</th>
            </tr>
          </thead>
          <tbody>
            ${Rows}
            <template id="EmptyData">
              <tr><td colspan="4">Downloading book list...</td></tr>
            </template>
          </tbody>
        </table>
      </template>

      <template id="SignIn">
        <h1 class="title">Sign in</h1>
        <form onsubmit="${SignIn}">
          <div class="field">
            <label class="label">Username</label>
            <div class="control">
              <input class="input" bind="${Username}" />
            </div>
          </div>
          <div class="field">
            <label class="label">Password</label>
            <div class="control">
              <input class="input" type="password" bind="${Password}" />
            </div>
          </div>
          <div class="field">
            <div class="control">
              <input type="submit" value="Sign in" />
            </div>
          </div>
          ${ErrorNotification}
        </form>
      </template>

      <template id="ErrorNotification">
        <div class="notification is-warning">
          <button class="delete ${HideClass}" onclick="${Hide}"></button>
          ${Text}
        </div>
      </template>

    </section>
  </div>
</div>
